<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02050b"/>
      <stop offset=".55" stop-color="#030712"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" x2="1">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset=".52" stop-color="#facc15"/>
      <stop offset=".53" stop-color="#2563eb"/>
      <stop offset=".78" stop-color="#2563eb"/>
      <stop offset=".79" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".65"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Luces de fondo -->
  <circle cx="1040" cy="120" r="220" fill="#facc15" opacity=".12" filter="url(#blur)"/>
  <circle cx="1240" cy="640" r="250" fill="#2563eb" opacity=".10" filter="url(#blur)"/>
  <circle cx="1320" cy="780" r="185" fill="#ef4444" opacity=".08" filter="url(#blur)"/>

  <!-- Bandera principal, movida hacia el centro para que no quede oculta -->
  <g opacity=".34">
    <path d="M660 138c270 78 495 74 720 0v252c-240 76-480 82-720 0V138Z" fill="url(#flag)"/>
    <path d="M694 188c210 38 430 30 642-14" stroke="#fff" stroke-opacity=".14" stroke-width="12" fill="none"/>
    <path d="M688 340c228 48 450 45 650-6" stroke="#fff" stroke-opacity=".08" stroke-width="10" fill="none"/>
  </g>

  <!-- Escudo ECU, más visible hacia la izquierda -->
  <g transform="translate(850 140)" filter="url(#shadow)">
    <path d="M175 0l142 48v132c0 98-56 182-142 224C89 362 33 278 33 180V48L175 0Z" fill="rgba(1,5,14,.72)" stroke="#facc15" stroke-width="8"/>
    <text x="175" y="180" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="78" font-weight="900" fill="#facc15" letter-spacing="-4">ECU</text>
    <text x="175" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#ffffff" opacity=".72">PHO3NIX</text>
  </g>

  <!-- Texto Ecuador, movido hacia la izquierda -->
  <g transform="translate(845 580) rotate(-6)" opacity=".92">
    <text x="0" y="0" font-family="Brush Script MT, Segoe Script, cursive" font-size="92" fill="#facc15">¡Vamos</text>
    <text x="90" y="82" font-family="Brush Script MT, Segoe Script, cursive" font-size="92" fill="#facc15">Ecuador!</text>
  </g>

  <!-- Confeti, también dentro del área visible -->
  <g opacity=".56">
    <rect x="760" y="95" width="18" height="10" rx="3" fill="#facc15" transform="rotate(-23 769 100)"/>
    <rect x="860" y="130" width="17" height="10" rx="3" fill="#2563eb" transform="rotate(25 868 135)"/>
    <rect x="1015" y="78" width="15" height="9" rx="3" fill="#ef4444" transform="rotate(-18 1022 83)"/>
    <rect x="1245" y="92" width="18" height="10" rx="3" fill="#facc15" transform="rotate(34 1254 97)"/>
    <rect x="1325" y="180" width="16" height="9" rx="3" fill="#2563eb" transform="rotate(-28 1333 185)"/>
    <rect x="1360" y="310" width="17" height="9" rx="3" fill="#ef4444" transform="rotate(21 1368 315)"/>
  </g>
</svg>